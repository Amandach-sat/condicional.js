<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercício 20</title>
</head>
<body>
   <h1>exercício 20</h1>
   <script>
    let valor = parseFloat(prompt("digite um valor"))
    document.write(" <br> o valor digitado é: " + valor)
    let prestacao = 5
    let valorPrestacao = valor / prestacao
    document.write(" <br> o valor da prestação é: " + valorPrestacao.toFixed(2))
   </script>
</body>
</html>
