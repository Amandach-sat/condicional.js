<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercício 19</title>
</head>
<body>
    <h1>exercício 19</h1>
    <script>
        let maior = 0

        for(let i =1 ; i <= 20; i++){
            numero = parseInt(prompt("digite um numero "))
            if (numero > 8) {
                maior++
            }
        }
        document.write(" <br> o a quantidade de numeros maiores que 8 é: " + maior)
    </script>
</body>
</html>
