<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercício 10</title>
</head>
<body>
    <h1>exercício 10</h1>
    <script>
        let nome = prompt("digite seu nome")
        document.write(" <br> o nome do usuario é :" + nome)
        let salario = parseFloat(prompt("digite seu salario"))
        document.write(" <br> o salario do usuario é :" + salario)
        let veindas = parseFloat(prompt("digite o valor das vendas do usuario"))
        document.write(" <br> o valor das vendas do usuario é :" + veindas)
        let comissao = veindas * 0.15
        document.write(" <br> o valor da comissão é :" + comissao.toFixed(2))
        let salarioFinal = salario + comissao
        document.write(" <br> o salario final do usuario é :" + salarioFinal.toFixed(2))
    </script>
</body>
</html>
