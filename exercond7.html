<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercício 7</title>
</head>
<body>
    <h1>exercício 7</h1>
    <script>
        let ipi = parseFloat(prompt("digite o valor do ipi"))
        document.write(" <br> o valor do ipi é:" + ipi)
        let cod1 = parseInt(prompt("digite o codigo da peça 1"))
        document.write(" <br> o codigo da peça 1 é:" + cod1)
        let valor1 = parseFloat(prompt("digite o valor da peça 1"))
        document.write(" <br> o valor da peça 1 é:" + valor1)
        let quantidade1 = parseInt(prompt("digite a quantidade de peças 1"))
        document.write(" <br> a quantidade de peças 1 é:" + quantidade1)

        let cod2 = parseInt(prompt("digite o codigo da peça 2"))
        document.write(" <br> o codigo da peça 2 é:" + cod2)
        let valor2 = parseFloat(prompt("digite o valor da peça 2"))
        document.write(" <br> o valor da peça 2 é:" + valor2)
        let quantidade2 = parseInt(prompt("digite a quantidade de peças 2"))
        document.write(" <br> a quantidade de peças 2 é:" + quantidade2)

        let valorp1 = valor1 + ipi
        document.write(" <br> o valor unitario da peça 1 é:" + valorp1)
        let valorp2 = valor2 + ipi
        document.write(" <br> o valor unitario da peça 2 é:" + valorp2)

        let valorTotal = (valor1 * quantidade1 + valor2 * quantidade2)* (ipi/100 + 1)
        document.write(" <br> o valor total é:" + valorTotal)

    </script>
</body>
</html>
