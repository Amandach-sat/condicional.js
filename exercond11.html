<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercício 11</title>
</head>
<body>
    <h1>exercício 11</h1>
    <script>
        let soma = 0
        //criar um loop (laço de repetição) que executa um bloco de código várias vezes de forma rápida, eficiente e automatizada//
        
        for (let i = 1; i <= 15; i++) {
            soma += i
        }
        document.write(" <br> a soma dos números de 1 a 15 é :" + soma)

    </script>
</body>
</html>
