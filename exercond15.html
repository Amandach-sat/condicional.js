<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercício 15</title>
</head>
<body>
    <h1>exercício 15</h1>
    <script>
       let soma = 0

        for(let i =1 ; i <= 20; i++){
            let numero = parseInt(prompt("digite um numero "))
            soma  += numero
        }
        let media = soma / 20
        document.write(" <br> a média dos numeros é:" + media.toFixed(1))
    </script>
</body>
</html>
