<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercício 18</title>
</head>
<body>
    <h1>exercício 18</h1>
    <script>
        let cotaçaoDolar = 5.26
        document.write(" <br> a cotação do dolar é: " + cotaçaoDolar)
        let dolares  = parseFloat(prompt("digite a  quantidade  em dolares"))
        document.write(" <br> Dólares: US$  " + dolares)

        let reais = dolares * cotaçaoDolar
        document.write(" <br> o valor em reais é: R$ " + reais)

    </script>
    
</body>
</html>
