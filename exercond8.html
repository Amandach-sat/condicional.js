<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercício 8</title>
</head>
<body>
    <h1>exercício 8</h1>
    <script>
         let SalarioMinimo = 1621.00
        document.write("valor do salario minimo é : " + SalarioMinimo)
        let salarioDoUsuario = parseFloat(prompt("digite seu salario"))
        document.write(" <br> valor do salario do usuario é :" + salarioDoUsuario)

        let quantidade = salarioDoUsuario / SalarioMinimo

        document.write("<br> quantidade de salarios minimos é :" + quantidade)
         
    </script>
    
</body>
</html>
